<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACCOUNT & CONFIG | KINGS DRIPPING SWAG</title>
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.4/build/spline-viewer.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #03040c;
            --panel-bg: rgba(7, 12, 30, 0.75);
            --panel-border: rgba(0, 255, 255, 0.4);
            --cyan: #00f2ff;
            --purple: #d000ff;
            --danger: #ff0055;
            --text-main: #e2f1f8;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            width: 100vw; height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #spline-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; opacity: 0.8; }

        .content-box {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            box-shadow: 0 0 50px rgba(0,255,255,0.1), inset 0 0 20px rgba(0,255,255,0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            text-align: center;
            width: 60%;
            max-width: 800px;
            animation: float 4s ease-in-out infinite;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--cyan);
            font-size: 3rem;
            margin-bottom: 20px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        p { font-size: 1.2rem; margin-bottom: 30px; font-family: 'Space Mono', monospace; }

        .btn-back {
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid var(--cyan);
            color: var(--cyan);
            padding: 15px 30px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background: var(--cyan); color: #000; box-shadow: 0 0 30px var(--cyan); transform: scale(1.05);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Glitch Layer */
        #glitch-transition {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 10000; pointer-events: none; opacity: 0;
            display: none; mix-blend-mode: exclusion;
        }

        .glitch-anim {
            display: block !important;
            animation: fullGlitch 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes fullGlitch {
            0% { opacity: 0; background: transparent; transform: scale(1); filter: contrast(1) invert(0); }
            10% { opacity: 1; background: #00f2ff; transform: scale(1.05) translate(-20px, 15px) skewX(20deg); filter: contrast(2) invert(1); }
            20% { opacity: 1; background: #ff0055; transform: scale(0.95) translate(20px, -15px) skewX(-20deg); }
            30% { opacity: 1; background: transparent; transform: scale(1.1) skewY(10deg); filter: contrast(1.5) hue-rotate(90deg); }
            40% { opacity: 1; background: #000; transform: scale(1.2) translate(-15px, -10px); }
            50% { opacity: 0.8; background: #fff; mix-blend-mode: difference; transform: scale(1) translate(15px, 20px) skewX(40deg); }
            60% { opacity: 1; background: #d000ff; mix-blend-mode: overlay; transform: scale(1.02); }
            80% { opacity: 1; background: #00f2ff; transform: translate(-10px, 10px) skewX(-10deg); }
            100% { opacity: 1; background: #03040c; transform: translate(0); filter: none; mix-blend-mode: normal; }
        }
    </style>
</head>
<body>

    <spline-viewer id="spline-bg" url="https://prod.spline.design/kYnLmsUq8oR4Q4P7/scene.splinecode"></spline-viewer>
    <div id="glitch-transition" class="glitch-anim"></div>

    <div class="content-box">
        <h1>ACCOUNT & CONFIG</h1>
        <p>Aetherflow module initializing... Stand by for quantum synchronization payload.</p>
        <button class="btn-back" onclick="goBack()">RETURN TO MISSION CONTROL</button>
    </div>

    <script>
        // Start by clearing glitch
        setTimeout(() => {
            document.getElementById('glitch-transition').classList.remove('glitch-anim');
        }, 600);

        function goBack() {
            const glitch = document.getElementById('glitch-transition');
            glitch.classList.add('glitch-anim');
            document.querySelector('.content-box').style.transform = "scale(1.2) rotate(-5deg)";
            document.querySelector('.content-box').style.filter = "contrast(200%) blur(5px)";
            
            setTimeout(() => {
                window.location.href = "/";
            }, 550);
        }
    </script>
</body>
</html>
